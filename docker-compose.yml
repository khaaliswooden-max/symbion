version: '3.8'

services:
  api:
    build:
      context: ./cloud-backend
      target: development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/symbion
      - MONGODB_TEST_URI=mongodb://mongo:27017/symbion_test
      - JWT_SECRET=symbion-dev-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=symbion-dev-refresh-secret-change-in-production
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8081
      - RATE_LIMIT_MAX_REQUESTS=1000
    volumes:
      - ./cloud-backend/src:/app/src
      - ./cloud-backend/logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
